<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CNS Quiz – Test</title>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 800px; margin: 0 auto; }
        .option { display: block; margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #e0e0e0; }
        .correct { background: #d4edda; border-color: #28a745; }
        .wrong { background: #f8d7da; border-color: #dc3545; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .feedback.show { display: block; }
        .explanation { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 8px; }
        #nav { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
        #nav button { padding: 8px 16px; cursor: pointer; }
        #nav .qbtn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ccc; background: white; cursor: pointer; }
        #nav .qbtn.active { border-color: blue; background: blue; color: white; }
        #nav .qbtn.answered-correct { border-color: green; background: #d4edda; }
        #nav .qbtn.answered-wrong { border-color: red; background: #f8d7da; }
        #status { margin: 20px 0; padding: 10px; border-radius: 8px; }
        #status.error { background: #f8d7da; color: #721c24; }
        #status.success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <h1>🧠 CNS Quiz – Test Mode</h1>

    <div id="status">Loading...</div>

    <div id="nav"></div>

    <div id="question">
        <h2 id="qText">Loading...</h2>
        <div id="options"></div>
        <div id="feedback" class="feedback">
            <strong id="fbLabel"></strong>
            <p id="fbText"></p>
            <div class="explanation" id="explanationText"></div>
        </div>
    </div>

    <div style="margin-top:20px;">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
        <button id="resetBtn">⟲ Reset</button>
    </div>

    <div style="margin-top:20px; border-top:1px solid #ccc; padding-top:20px;">
        <p>✅ Correct: <span id="correctCount">0</span> &nbsp;| ❌ Wrong: <span id="wrongCount">0</span> &nbsp;| ⏱️ Answered: <span id="answeredCount">0</span></p>
    </div>

    <!-- ─── THIS IS THE IMPORTANT LINE ──────────────────────────────── -->
    <script src="questions.js"></script>

    <script>
        // ─── Check if QUESTION_BANK loaded ──────────────────────────────
        const status = document.getElementById('status');

        if (typeof QUESTION_BANK === 'undefined') {
            status.className = 'error';
            status.textContent = '❌ ERROR: questions.js failed to load. Please check the file exists.';
            console.error('QUESTION_BANK is not defined.');
        } else {
            status.className = 'success';
            status.textContent = '✅ questions.js loaded! Total questions: ' + QUESTION_BANK.length;
            console.log('✅ questions.js loaded. Total questions:', QUESTION_BANK.length);
            startQuiz();
        }

        // ─── QUIZ ENGINE ──────────────────────────────────────────────────
        function startQuiz() {
            const state = {
                questions: QUESTION_BANK || [],
                currentIndex: 0,
                answered: false,
                correctCount: 0,
                wrongCount: 0,
                userAnswers: {},
                results: {}
            };

            function render() {
                const q = state.questions[state.currentIndex];
                if (!q) return;

                document.getElementById('qText').textContent = q.text;

                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = '';
                const labels = ['A', 'B', 'C', 'D', 'E'];
                q.options.forEach((text, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = labels[i] + '. ' + text;
                    div.dataset.index = i;
                    div.addEventListener('click', () => handleClick(i));
                    optionsDiv.appendChild(div);
                });

                // Restore state
                const prevAns = state.userAnswers[state.currentIndex];
                const items = optionsDiv.querySelectorAll('.option');
                if (prevAns !== undefined) {
                    items.forEach(el => {
                        if (parseInt(el.dataset.index) === prevAns) {
                            el.style.border = '2px solid blue';
                        }
                    });
                    if (state.results[state.currentIndex]) {
                        const isCorrect = state.results[state.currentIndex] === 'correct';
                        showFeedback(isCorrect, q.answer);
                        state.answered = true;
                        items.forEach(el => {
                            const idx = parseInt(el.dataset.index);
                            if (idx === q.answer) el.style.border = '2px solid green';
                            if (idx === prevAns && prevAns !== q.answer) el.style.border = '2px solid red';
                            el.style.pointerEvents = 'none';
                            el.style.opacity = '0.7';
                        });
                    } else {
                        state.answered = false;
                        document.getElementById('feedback').className = 'feedback';
                    }
                } else {
                    state.answered = false;
                    document.getElementById('feedback').className = 'feedback';
                }

                // Update stats
                document.getElementById('correctCount').textContent = state.correctCount;
                document.getElementById('wrongCount').textContent = state.wrongCount;
                document.getElementById('answeredCount').textContent = Object.keys(state.results).length;

                // Build navigator
                buildNavigator();
            }

            function handleClick(index) {
                if (state.answered) return;
                const q = state.questions[state.currentIndex];
                const isCorrect = index === q.answer;
                state.answered = true;
                state.userAnswers[state.currentIndex] = index;
                state.results[state.currentIndex] = isCorrect ? 'correct' : 'wrong';
                if (isCorrect) state.correctCount++;
                else state.wrongCount++;

                showFeedback(isCorrect, q.answer);
                render();

                const items = document.querySelectorAll('.option');
                items.forEach(el => {
                    const idx = parseInt(el.dataset.index);
                    if (idx === q.answer) el.style.border = '2px solid green';
                    if (idx === index && index !== q.answer) el.style.border = '2px solid red';
                    el.style.pointerEvents = 'none';
                    el.style.opacity = '0.7';
                });
            }

            function showFeedback(isCorrect, answer) {
                const q = state.questions[state.currentIndex];
                const fb = document.getElementById('feedback');
                fb.className = 'feedback show';
                fb.style.borderLeft = '5px solid ' + (isCorrect ? '#28a745' : '#dc3545');
                document.getElementById('fbLabel').textContent = isCorrect ? '✅ Correct!' : '❌ Incorrect';
                document.getElementById('fbText').textContent = isCorrect ? 'Well done!' : 'The correct answer was ' + String.fromCharCode(65 + answer) + '.';
                document.getElementById('explanationText').textContent = q.explanation || 'No explanation provided.';
            }

            function buildNavigator() {
                const nav = document.getElementById('nav');
                nav.innerHTML = '';
                state.questions.forEach((q, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'qbtn';
                    btn.textContent = i + 1;
                    if (i === state.currentIndex) btn.classList.add('active');
                    if (state.results[i] === 'correct') btn.classList.add('answered-correct');
                    if (state.results[i] === 'wrong') btn.classList.add('answered-wrong');
                    btn.addEventListener('click', () => {
                        state.currentIndex = i;
                        render();
                    });
                    nav.appendChild(btn);
                });
            }

            document.getElementById('prevBtn').addEventListener('click', () => {
                if (state.currentIndex > 0) {
                    state.currentIndex--;
                    render();
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (state.currentIndex < state.questions.length - 1) {
                    state.currentIndex++;
                    render();
                }
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                state.currentIndex = 0;
                state.userAnswers = {};
                state.results = {};
                state.correctCount = 0;
                state.wrongCount = 0;
                render();
            });

            render();
        }
    </script>

</body>
</html>
